<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Signal Intelligence — Multi-Agent QI Pipeline</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — github.com/rafgraph/spa-github-pages
      // GitHub Pages has no server-side rewrites, so a direct/refreshed load of a
      // client-side route (e.g. /AgenticWorkflow/trends) hits this 404 page. It
      // re-encodes the path into a query string and redirects to index.html,
      // which decodes it back before React Router mounts (see index.html).
      var pathSegmentsToKeep = 1; // keep "/AgenticWorkflow"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
